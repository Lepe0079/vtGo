name: Release

# Runs on version tags (v1.0.0, v0.2.1, ...) and can also be triggered
# manually from the Actions tab for test runs that don't need a real tag.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  WAILS_VERSION: v2.13.0

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      # Let the other platforms keep building even if one fails.
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            wails_platform: windows/amd64
            artifact_name: vtGo-windows-amd64
          - os: ubuntu-latest
            wails_platform: linux/amd64
            artifact_name: vtGo-linux-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Build
        run: wails build -platform ${{ matrix.wails_platform }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path build/bin/vtGo.exe -DestinationPath vtGo-windows-amd64.zip

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: tar -czf vtGo-linux-amd64.tar.gz -C build/bin vtGo

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: vtGo-*
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
